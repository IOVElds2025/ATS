name: CI/CD Pipeline

on:
  push:
    branches: [frontend, dev, main, devops]
  pull_request:
    branches: [frontend, dev, main, devops]

# Environment variables available to all jobs
env:
  NODE_VERSION: 20.x
  PYTHON_VERSION: '3.10'
  WORKING_DIRECTORY: ./my-app
  DJANGO_SETTINGS_MODULE: your_project.settings
  DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      working-directory: ${{ env.WORKING_DIRECTORY }}
    
    - name: Run linting
      run: npm run lint
      working-directory: ${{ env.WORKING_DIRECTORY }}
    
    - name: Build application
      run: npm run build
      working-directory: ${{ env.WORKING_DIRECTORY }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: ${{ env.WORKING_DIRECTORY }}/dist
        retention-days: 5

  # Backend Tests
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev default-libmysqlclient-dev build-essential
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        
    - name: Run Django tests
      run: |
        python manage.py test
      env:
        DJANGO_SETTINGS_MODULE: ${{ env.DJANGO_SETTINGS_MODULE }}
        SECRET_KEY: ${{ env.DJANGO_SECRET_KEY }}
        DATABASE_URL: ${{ env.DATABASE_URL }}
        DEBUG: 'False'

  # Deployment to Namecheap (Manual Trigger)
  deploy-namecheap:
    needs: [lint-and-build, test-backend]
    runs-on: ubuntu-latest
    
    # This job will only run when manually triggered or on main/dev branches
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: ./dist
    
    - name: Create deployment package
      run: |
        # Create a timestamp for the deployment
        TIMESTAMP=$(date +"%Y%m%d%H%M%S")
        # Create a zip file of the build
        zip -r deployment-$TIMESTAMP.zip ./dist/*
        # This zip file can be downloaded from the GitHub Actions artifacts
      
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: namecheap-deployment-package
        path: ./deployment-*.zip
        retention-days: 5
    
    - name: Notify about manual deployment needed
      if: github.event_name != 'workflow_dispatch'
      run: |
        echo "Automatic deployment is not configured. Please follow these steps:"
        echo "1. Download the 'namecheap-deployment-package' artifact from this workflow run"
        echo "2. Log in to the Namecheap cPanel"
        echo "3. Upload the contents to the public_html directory (or appropriate subdirectory)"
        echo "4. Clear any CDN cache if applicable"
        
        # This will make the workflow fail to ensure deployment is not missed
        # Remove this line if you want the workflow to pass without deployment
        exit 1

